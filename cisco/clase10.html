<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let sX = prompt("Ingrese el primer numero");
        let sY = prompt("Ingrese el segundo numero");
        let x = Number(sX);
        let y = Number(sY);
        if (Number.isFinite(x) && Number.isFinite(y) && y !== 0) {
            console.log(x / y);
        } else {
            console.log("incorrect arguments");
        }

    </script>
</body>
</html>
